server:
  port: ${PORT:8080}

spring:
  application:
    name: portfolio-api
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

portfolio-mail:
  # where contact-form messages are delivered; sending is skipped if MAIL_USERNAME is unset
  to: ${MAIL_TO:patilbuddhaprakash@gmail.com}

portfolio:
  # comma-separated; override in Render env for the real GitHub Pages origin
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,https://patil2001.github.io}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui
