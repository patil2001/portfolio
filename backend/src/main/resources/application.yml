server:
  port: ${PORT:8080}

spring:
  application:
    name: portfolio-api

portfolio:
  # comma-separated; override in Render env for the real GitHub Pages origin
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,https://patil2001.github.io}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui
